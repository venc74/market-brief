name: Daily Investment Brief

# Пуска се само ръчно, през workflow_dispatch (external trigger от cron-job.org,
# веднъж дневно към 07:30 Europe/Berlin) — виж CLAUDE.md за причината да няма
# schedule: тригер тук (GitHub-native scheduler се оказа ненадежден).
on:
  workflow_dispatch: {}       # ръчно пускане за тест

permissions:
  contents: write             # за commit на docs/ и data/

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NASDAQ_API_KEY: ${{ secrets.NASDAQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          PORTFOLIO_SIZE: ${{ vars.PORTFOLIO_SIZE }}
          RISK_PER_TRADE_PCT: ${{ vars.RISK_PER_TRADE_PCT }}
        run: python src/main.py

      - name: Commit dashboard + data
        run: |
          git config user.name "brief-bot"
          git config user.email "actions@github.com"
          git add docs/ data/
          git diff --cached --quiet || git commit -m "brief: $(date +%F)"
          git push
